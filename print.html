<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Number List</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',Arial,sans-serif;font-size:12px;color:#111;background:#f1f5f9;min-height:100vh;}

  .toolbar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 20px;background:#1e40af;color:#fff;
    position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18);
  }
  .toolbar-title{font-size:14px;font-weight:800;flex:1;}
  .btn-print{padding:8px 20px;background:#fff;color:#1e40af;border:none;border-radius:6px;font-size:13px;font-weight:800;cursor:pointer;}
  .btn-print:hover{background:#e0e7ff;}
  .btn-back{padding:8px 16px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;}
  .btn-back:hover{background:rgba(255,255,255,.25);}

  .state-msg{text-align:center;padding:60px 20px;color:#6b7280;font-size:14px;font-weight:600;}

  .page{max-width:1200px;margin:0 auto;padding:24px 20px 40px;}

  .print-header{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #1e40af;}
  .print-header h1{font-size:16px;font-weight:800;color:#1e40af;text-transform:uppercase;letter-spacing:.5px;}
  .print-header .date-lbl{font-size:13px;font-weight:700;color:#111;margin-top:5px;}
  .print-header .gen{font-size:11px;color:#9ca3af;margin-top:3px;}

  .tbl-wrap{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  table{width:100%;border-collapse:collapse;}
  thead tr:first-child th{
    font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
    padding:10px 10px 4px;text-align:left;color:#fff;background:#1e40af;
    border-bottom:none;
  }
  thead tr.sub-header th{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
    padding:4px 10px 8px;text-align:left;color:#bfdbfe;background:#1e40af;
    border-bottom:2px solid rgba(0,0,0,.15);
  }
  .th-group{border-left:1px solid rgba(255,255,255,.2);}
  tbody tr{border-bottom:1px solid #f1f5f9;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:nth-child(even){background:#f8fafc;}
  td{padding:9px 10px;vertical-align:middle;color:#374151;font-size:12px;}
  td.tc-num{text-align:center;font-weight:700;color:#9ca3af;font-size:11px;width:36px;}

  /* ── Control Number Cell ── */
  td.tc-control{
    text-align:center;font-family:'Courier Prime',monospace;
    font-weight:700;font-size:14px;white-space:nowrap;width:72px;
    border-radius:0;
  }
  td.tc-control.am{background:#dbeafe;color:#1d4ed8;}
  td.tc-control.pm{background:#ccfbf1;color:#0f766e;}

  td.tc-name{font-weight:800;color:#111827;}
  td.tc-id{font-family:'Courier Prime',monospace;font-size:11px;color:#4b5563;}
  td.tc-date{white-space:nowrap;color:#6b7280;font-size:11px;}
  td.group-start{border-left:1px solid #e5e7eb;}
  .empty-row td{text-align:center;color:#aaa;padding:24px;font-style:italic;}

  /* ── Session divider row ── */
  tr.session-divider td{
    background:#eff6ff;border-top:2px solid #93c5fd;border-bottom:1px solid #bfdbfe;
    font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
    color:#1e40af;padding:7px 12px;
  }
  tr.session-divider.pm td{
    background:#f0fdfa;border-top:2px solid #5eead4;border-bottom:1px solid #99f6e4;
    color:#0f766e;
  }

  .print-footer{margin-top:16px;display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;}

  @media print{
    body{background:#fff;}
    .toolbar{display:none!important;}
    .page{max-width:100%;padding:0;}
    .tbl-wrap{box-shadow:none;border-radius:0;}
    thead th{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tbody tr:nth-child(even){-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.tc-control{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr.session-divider td{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr{page-break-inside:avoid;}
    thead{display:table-header-group;}
    @page{margin:10mm;size:A4 landscape;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">Print Preview <span id="toolbar-date-label"></span></div>
  <button class="btn-back" onclick="window.close()">Back to Admin</button>
  <button class="btn-print" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="page" id="page-content">
  <div class="state-msg">Loading data...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyAiRK64ZYzF8lBKnxmubCZEO9qrCN42B1g",authDomain:"fti-queue.firebaseapp.com",
  databaseURL:"https://fti-queue-default-rtdb.firebaseio.com",projectId:"fti-queue",
  storageBucket:"fti-queue.firebasestorage.app",messagingSenderId:"794859488896",
  appId:"1:794859488896:web:4e7dcb7e830fc4bf334865"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pad3(n){return String(n).padStart(3,'0');}

const params=new URLSearchParams(window.location.search);
const dateStr=params.get('date');

if(!dateStr){
  showError('No date specified. Please go back and select a date.');
} else {
  loadAndRender(dateStr);
}

function showError(msg){
  document.getElementById('page-content').innerHTML=
    '<div class="state-msg">'+esc(msg)+'<br><br><a href="admin.html" style="color:#1e40af;font-weight:700;">Back to Admin</a></div>';
}

async function loadAndRender(ds){
  const d=new Date(ds+'T00:00:00');
  const dateLabel=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  document.title='Control Number List — '+dateLabel;
  document.getElementById('toolbar-date-label').textContent='— '+dateLabel;

  let tickets=[];
  try{
    const snap=await db.ref('tickets').orderByChild('date').equalTo(ds).once('value');
    if(snap.exists()){
      snap.forEach(c=>{const t=c.val();if(t&&t.date===ds)tickets.push({id:c.key,...t});});
    }
  }catch(e){showError('Failed to load data: '+e.message);return;}

  if(!tickets.length){
    document.getElementById('page-content').innerHTML=
      '<div class="state-msg">No records found for <strong>'+dateLabel+'</strong>.<br><br><a href="admin.html" style="color:#1e40af;font-weight:700;">Back to Admin</a></div>';
    return;
  }

  tickets.sort((a,b)=>a.number-b.number);

  const amTickets=tickets.filter(t=>t.time==='AM');
  const pmTickets=tickets.filter(t=>t.time==='PM');

  const genTime=new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});

  function makeRows(list, session){
    if(!list.length){
      return '<tr class="empty-row"><td colspan="9"><em>No '+session+' records for this date</em></td></tr>';
    }
    return list.map((t,i)=>{
      const sc=session.toLowerCase();
      return '<tr>'+
        '<td class="tc-num">'+(i+1)+'</td>'+
        '<td class="tc-control '+sc+'">#'+pad3(t.number)+'</td>'+
        '<td class="tc-name">'+esc(t.name||'—')+'</td>'+
        '<td class="group-start">'+esc(t.ben1Name||'—')+'</td>'+
        '<td>'+esc(t.idType||'—')+'</td>'+
        '<td class="tc-id">'+esc(t.idNumber||'—')+'</td>'+
        '<td class="group-start">'+esc(t.ben2Name||'—')+'</td>'+
        '<td>'+esc(t.idType2||'—')+'</td>'+
        '<td class="tc-id">'+esc(t.idNumber2||'—')+'</td>'+
        '</tr>';
    }).join('');
  }

  const rows=
    '<tr class="session-divider am"><td colspan="9">🌅 AM Session &nbsp;—&nbsp; '+amTickets.length+' record(s)</td></tr>'+
    makeRows(amTickets,'AM')+
    '<tr class="session-divider pm"><td colspan="9">🌇 PM Session &nbsp;—&nbsp; '+pmTickets.length+' record(s)</td></tr>'+
    makeRows(pmTickets,'PM');

  const html=`
    <div class="print-header">
      <h1>P20 DDN — Control Number List</h1>
      <div class="date-lbl">Distribution Date: ${dateLabel}</div>
      <div class="gen">Generated: ${genTime} &nbsp;·&nbsp; Total: ${tickets.length} record(s) &nbsp;·&nbsp; 🌅 AM: ${amTickets.length} &nbsp;·&nbsp; 🌇 PM: ${pmTickets.length}</div>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th rowspan="2" style="width:36px;">#</th>
            <th rowspan="2" style="width:72px;text-align:center;">Control No.</th>
            <th rowspan="2">Claimant Full Name</th>
            <th colspan="3" class="th-group" style="border-bottom:1px solid rgba(255,255,255,.2);">Beneficiary 1</th>
            <th colspan="3" class="th-group" style="border-bottom:1px solid rgba(255,255,255,.2);">Beneficiary 2</th>
          </tr>
          <tr class="sub-header">
            <th class="th-group">Name</th>
            <th>ID Classification</th>
            <th>ID Number</th>
            <th class="th-group">Name</th>
            <th>ID Classification</th>
            <th>ID Number</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="print-footer">
      <span>P20 DDN Control Number System</span>
      <span>${tickets.length} record(s) &nbsp;·&nbsp; ${dateLabel}</span>
    </div>
  `;

  document.getElementById('page-content').innerHTML=html;
}
</script>
</body>
</html>
